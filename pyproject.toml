[dependency-groups]
test = [
    "pytest (>=9.1.1,<10.0.0)"
]
lint = [
    "vermin (>=1.8.0,<2.0.0)",
    "pylint (>=4.0.6,<5.0.0)",
    "pyright (>=1.1.411,<2.0.0)"
]
